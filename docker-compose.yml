version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - LLM_PROVIDER=${LLM_PROVIDER}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - ./chroma_db:/app/chroma_db
      - ./data:/app/data
    ports:
      - "8000:8000"
    command: ["/bin/sh", "-c", "echo 'TODO: wire backend service' && sleep 3600"]

  ui:
    image: python:3.11-slim
    environment:
      - STREAMLIT_SERVER_PORT=8501
    volumes:
      - ./ui:/app/ui
    ports:
      - "8501:8501"
    command: ["/bin/sh", "-c", "echo 'TODO: wire UI service' && sleep 3600"]
